name: Mini-soak

# 30 real-time minutes on windows-latest is billed as 60 minutes (2x Windows
# multiplier). Deliberately not run on every PR — see docs/testing/TESTING.md
# "Why the mini-soak isn't on every PR". The fast fake-clock 8h simulation
# and the forbidden-API scan already gate every PR via the main `ci.yml`
# pytest run.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      minutes:
        description: "Mini-soak duration in minutes"
        required: false
        default: "30"

jobs:
  mini-soak:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -e ".[dev]"
      - run: python -m tools.test_harness.run_soak_test --minutes ${{ github.event.inputs.minutes || '30' }}
